<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#060d18" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KC ERP" />
    <meta name="description" content="Shree K C Sarswat Auto Fuel Station — Premium ERP v4.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>KC Sarswat ERP</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: #060d18;
        font-family: 'Sora', system-ui, -apple-system, sans-serif;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
        overflow: hidden;
        height: 100%;
        touch-action: manipulation;
      }
      #root { height: 100%; overflow: hidden; }

      /* ── Splash screen — prevents white flash on load ── */
      #splash {
        position: fixed; inset: 0; background: #060d18;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; z-index: 9999;
        transition: opacity 0.5s ease 0.2s;
      }
      #splash.fade { opacity: 0; pointer-events: none; }
      .splash-icon { font-size: 68px; margin-bottom: 18px; animation: spl-pulse 2s ease-in-out infinite; }
      .splash-brand { color: #f1f5f9; font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }
      .splash-sub   { color: #f59e0b; font-size: 12px; margin-top: 5px; font-weight: 600; }
      .splash-bar   { margin-top: 36px; width: 130px; height: 2px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
      .splash-fill  { height: 100%; width: 35%; background: linear-gradient(90deg,#f59e0b,#d97706); border-radius: 99px; animation: spl-slide 1.3s ease-in-out infinite; }
      @keyframes spl-slide  { 0%{transform:translateX(-100%)} 100%{transform:translateX(420%)} }
      @keyframes spl-pulse  { 0%,100%{opacity:1} 50%{opacity:0.7} }
    </style>
  </head>
  <body>
    <!-- Splash — removed by JS after React mounts -->
    <div id="splash">
      <div class="splash-icon">⛽</div>
      <div class="splash-brand">KC Sarswat ERP</div>
      <div class="splash-sub">Shree K C Sarswat Auto Fuel Station</div>
      <div class="splash-bar"><div class="splash-fill"></div></div>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) { s.classList.add('fade'); setTimeout(() => s && s.remove(), 600); }
        }, 900);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
