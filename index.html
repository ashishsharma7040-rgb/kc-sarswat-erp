<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- viewport-fit=cover is REQUIRED for safe-area on notched iPhones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- ── Android PWA install ── -->
    <meta name="theme-color" content="#060d18" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── iOS PWA install — these make it a REAL app on iPhone ── -->
    <!-- Without these, iOS just adds a webpage shortcut, not an app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KC ERP" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- ── iOS Splash screens — prevents white flash on open ── -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- ── Windows / Samsung ── -->
    <meta name="msapplication-TileColor" content="#060d18" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <meta name="description" content="Shree K C Sarswat Auto Fuel Station — Premium ERP v4.0" />

    <!-- Sora font — preconnect avoids render blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <title>KC Sarswat ERP</title>

    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        background: #060d18;
        font-family: 'Sora', system-ui, -apple-system, sans-serif;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
        overflow: hidden;
        height: 100%;
        /* Prevent double-tap zoom — makes it feel native */
        touch-action: manipulation;
      }

      /* Safe area padding — respects iPhone notch + Android nav bar */
      body {
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }

      #root { height: 100%; overflow: hidden; }

      /* ── Splash screen — no white flash on app open ── */
      #splash {
        position: fixed; inset: 0;
        background: #060d18;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column;
        z-index: 9999;
        transition: opacity 0.45s ease 0.15s;
      }
      #splash.fade { opacity: 0; pointer-events: none; }
      .sp-icon  { font-size: 68px; margin-bottom: 18px; animation: sp-pulse 2s ease-in-out infinite; }
      .sp-brand { color: #f1f5f9; font-family: 'Sora', system-ui; font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }
      .sp-sub   { color: #f59e0b; font-family: 'Sora', system-ui; font-size: 12px; margin-top: 5px; font-weight: 600; }
      .sp-ver   { color: #1e3a5f; font-family: 'Sora', system-ui; font-size: 10px; margin-top: 6px; }
      .sp-bar   { margin-top: 36px; width: 130px; height: 2px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
      .sp-fill  { height: 100%; width: 35%; background: linear-gradient(90deg, #f59e0b, #d97706); border-radius: 99px; animation: sp-slide 1.3s ease-in-out infinite; }

      @keyframes sp-slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(420%)} }
      @keyframes sp-pulse { 0%,100%{opacity:1} 50%{opacity:0.65} }
    </style>
  </head>
  <body>

    <!-- Splash removed by JS after React mounts -->
    <div id="splash">
      <div class="sp-icon">⛽</div>
      <div class="sp-brand">KC Sarswat ERP</div>
      <div class="sp-sub">Shree K C Sarswat Auto Fuel Station</div>
      <div class="sp-ver">v4.0 · Lunkaransar, Rajasthan</div>
      <div class="sp-bar"><div class="sp-fill"></div></div>
    </div>

    <div id="root"></div>

    <script>
      // Remove splash once page loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) {
            s.classList.add('fade');
            setTimeout(() => s && s.remove(), 600);
          }
        }, 900);
      });
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
